<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Array in JS</title>
</head>
<body>
    <script>
        //array is collection of many data types
        let num=[3,5,6,7,8,9,10,12,14,6];
        
        console.log(num.lastIndexOf(14));

        console.log("length is " + num.length);
        //remove the last element from array
        console.log(num.pop());
        console.log("updated array " + num);
        //add element in the last of the array
        console.log(num.push(99));
        console.log("updated array after push method " + num);

        //shift and unshift
        //shift:- 
        console.log(num.shift());
        console.log(`updated array after shift ${num}`);

        // slice and splice
    </script>
</body>
</html>
