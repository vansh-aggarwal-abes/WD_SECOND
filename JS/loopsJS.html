<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loops in Java script</title>
</head>
<body>
    <script>
        //JavaScript provides several types of loops to execute a block of code repeatedly until a specific condition is met
        
        let studentList=["vansh", "pratham", "kush", "rahul",["ayushi", 29]];
        // for loop
        for(let i = 0; i<studentList.length ; i ++){
            console.log(studentList[i]);
        }
        // while.......
        let x = 0 ;
        while(x < studentList.length){
            console.log(studentList[x]);
            x++;
        }
        // for...in ... see an example fro object

        //for.of.........
        for(let x of studentList){
            console.log(x);
        }
    </script>
</body>
</html>
